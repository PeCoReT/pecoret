services:
  backend:
    build: .
    environment:
      DB_NAME: pecoret
      DB_USER: pecoret
      DB_PASSWORD: dontusethispassword
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: dontusethispasswordtoo
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      ALLOWED_HOSTS: localhost
    volumes:
      - ./volumes/server/conf:/opt/pecoret/conf
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      db:
        condition: service_healthy


  db:
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: dontusethispassword
      POSTGRES_DB: pecoret
      POSTGRES_USER: pecoret
    volumes:
      - ./volumes/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 10s  

  worker:
    build: .
    entrypoint: python3 manage.py qcluster
    environment:
      DB_NAME: pecoret
      DB_USER: pecoret
      DB_PASSWORD: dontusethispassword
    volumes:
      - ./volumes/server/conf:/opt/pecoret/conf
    depends_on:
      db:
        condition: service_healthy

volumes:
  server-static:
